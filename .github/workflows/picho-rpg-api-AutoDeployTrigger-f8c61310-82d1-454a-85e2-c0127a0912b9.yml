name: Trigger auto deployment for picho-rpg-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/picho-rpg-api-AutoDeployTrigger-f8c61310-82d1-454a-85e2-c0127a0912b9.yml'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PICHORPGAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PICHORPGAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PICHORPGAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: pichorpg2404acr.azurecr.io
          registryUsername: ${{ secrets.PICHORPGAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PICHORPGAPI_REGISTRY_PASSWORD }}
          containerAppName: picho-rpg-api
          resourceGroup: AZR-BR
          imageToBuild: pichorpg2404acr.azurecr.io/picho-rpg-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_
